services:
  research-worker:
    build:
      context: .
    command: ["atr", "run", "--config", "config/default.yaml"]
    environment:
      ATR_CONFIG: config/default.yaml
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
  api-server:
    build:
      context: .
    command: ["atr", "dashboard", "--config", "config/default.yaml", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      ATR_CONFIG: config/default.yaml
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/system_status').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
