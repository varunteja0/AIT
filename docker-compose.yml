services:
  research-engine:
    build:
      context: .
    command: ["atr", "run", "--config", "config/default.yaml"]
    environment:
      ATR_CONFIG: config/default.yaml
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
  ui-server:
    build:
      context: .
    command: ["atr", "dashboard", "--config", "config/default.yaml", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - database
  database:
    image: python:3.12-slim
    working_dir: /app
    command:
      - python
      - -c
      - |
        import pathlib, sqlite3, time
        pathlib.Path("/app/data").mkdir(parents=True, exist_ok=True)
        sqlite3.connect("/app/data/experiments.db").close()
        time.sleep(10**9)
    volumes:
      - ./data:/app/data
